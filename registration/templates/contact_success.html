{% extends 'registration/base.html' %}

{% block content %}
<div class="row justify-content-center my-5">
    <div class="col-md-6 text-center">
        <div style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,rgba(0,200,100,0.2),rgba(0,200,100,0.05));border:2px solid rgba(0,200,100,0.4);display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:2.5rem;">
            ✉️
        </div>
        <h2 style="font-family:'Outfit',sans-serif;font-weight:800;margin-bottom:0.75rem;">
            Thank you, {{ name }}!
        </h2>
        <p style="color:var(--text-secondary);font-size:1.05rem;margin-bottom:2rem;">
            We have received your message and will get back to you soon.
        </p>
        <a href="/" class="btn btn-primary">
            <i class="fas fa-home mr-1"></i>Back to Home
        </a>
    </div>
</div>
{% endblock %}
