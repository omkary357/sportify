<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful · Sportify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <div class="payment-container">
        <div class="payment-card">
            <span class="success-icon">&#10004;</span>
            <h2>Payment Successful!</h2>
            <p>Your payment has been processed successfully. Thank you for registering with Sportify!</p>
            <p>Our team will contact you soon with further event details.</p>

            <div class="mt-4">
                <a href="https://docs.google.com/forms/d/e/1FAIpQLSec4DGoIMGrS0SOlNDQtIw4xSctfAHoF6QGJHAZ5pzeDbjFeA/viewform?usp=sf_link"
                   class="btn" target="_blank">
                    <i class="fas fa-clipboard-list mr-1"></i>Fill Team / Individual Details
                </a>
                <br>
                <a href="{% url 'event_list' %}" class="btn btn-outline mt-2">
                    <i class="fas fa-arrow-left mr-1"></i>Back to Events
                </a>
            </div>
        </div>
    </div>
</body>
</html>
