<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Payment · Sportify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <div class="payment-container">
        <div class="payment-card">
            <p style="font-family:'Outfit',sans-serif;font-size:1.4rem;font-weight:900;margin-bottom:0.25rem;">
                <span style="color:#ff5722;">Sport</span>ify
            </p>
            <h2 style="margin-bottom:0.5rem;">Complete Payment</h2>
            <p>You're one step away from registering for this event.</p>

            <form id="razorpay-form" action="{% url 'payment_success' %}" method="POST">
                {% csrf_token %}
                <script
                    src="https://checkout.razorpay.com/v1/checkout.js"
                    data-key="{{ razorpay_key }}"
                    data-amount="{{ amount }}"
                    data-currency="INR"
                    data-order_id="{{ order_id }}"
                    data-buttontext="Pay Now"
                    data-name="Sportify"
                    data-description="Complete your registration"
                    data-prefill.name="{{ request.user.username }}"
                    data-prefill.email="{{ request.user.email }}"
                    data-theme.color="#ff5722">
                </script>
                <input type="hidden" name="razorpay_order_id" value="{{ order_id }}">
                <input type="hidden" name="razorpay_payment_id" id="razorpay_payment_id">
                <input type="hidden" name="razorpay_signature" id="razorpay_signature">
            </form>
        </div>
    </div>

    <script>
        var rzp = new Razorpay({
            "key": "{{ razorpay_key }}",
            "amount": "{{ amount }}",
            "currency": "INR",
            "name": "Sportify",
            "description": "Complete your registration",
            "order_id": "{{ order_id }}",
            "handler": function (response) {
                document.getElementById('razorpay_payment_id').value = response.razorpay_payment_id;
                document.getElementById('razorpay_signature').value = response.razorpay_signature;
                document.getElementById('razorpay-form').submit();
            },
            "theme": { "color": "#ff5722" }
        });
        rzp.open();
    </script>
</body>
</html>
